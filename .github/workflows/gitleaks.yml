name: gitleaks
on: [pull_request, push, workflow_dispatch]
jobs:
    scan:
        name: gitleaks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 0
            - uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Write job summary
              if: always()
              run: |
                  echo "### Docker build summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image (latest):** ghcr.io/${{ github.repository_owner }}/diet-glasses-gitleaks:latest" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image (sha):** ghcr.io/${{ github.repository_owner }}/diet-glasses-gitleaks:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "---" >> $GITHUB_STEP_SUMMARY
                  echo "(This summary was generated by the workflow)" >> $GITHUB_STEP_SUMMARY
