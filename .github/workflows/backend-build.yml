name: Build backend Docker image

on:
    push:
        paths:
            - "backend/**"
    pull_request:
        paths:
            - "backend/**"
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build:
        name: Build and push multi-arch image
        runs-on: ubuntu-latest
        concurrency:
            group: build-backend-${{ github.ref }}
            cancel-in-progress: true
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up QEMU (for emulation)
              uses: docker/setup-qemu-action@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Compute lowercase repo owner
              id: owner
              run: |
                  owner="${{ github.repository_owner }}"
                  owner_lower=$(echo "$owner" | tr '[:upper:]' '[:lower:]')
                  echo "owner_lower=$owner_lower" >> $GITHUB_OUTPUT

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push multi-arch image
              uses: docker/build-push-action@v4
              with:
                  context: ./backend
                  file: ./backend/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ghcr.io/${{ steps.owner.outputs.owner_lower }}/diet-glasses-backend:latest
                      ghcr.io/${{ steps.owner.outputs.owner_lower }}/diet-glasses-backend:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Write job summary
              if: always()
              run: |
                  echo "### Docker build summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image (latest):** ghcr.io/${{ steps.owner.outputs.owner_lower }}/diet-glasses-backend:latest" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image (sha):** ghcr.io/${{ steps.owner.outputs.owner_lower }}/diet-glasses-backend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "---" >> $GITHUB_STEP_SUMMARY
                  echo "(This summary was generated by the workflow)" >> $GITHUB_STEP_SUMMARY
